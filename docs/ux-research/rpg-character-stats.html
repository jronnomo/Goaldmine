<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RPG Character Stats — pixel mockup (real globals.css tokens)</title>
<style>
  /* Tokens mirrored verbatim from src/app/globals.css (light :root + dark block).
     Self-contained so this file renders standalone on GitHub. */
  .theme-light{
    --background:#FAF3E3; --foreground:#1F1408; --muted:#7A5E3A; --card:#FFFBF0;
    --border:#D9C8A2; --accent:#8A6212; --accent-fg:#FFFBF0; --accent-soft:rgba(138,98,18,.14);
    --target:#A82A1F; --target-fg:#FFFBF0; --success:#4E6B36; --warning:#A8511A; --danger:#A82A1F;
  }
  .theme-dark{
    --background:#0F0B07; --foreground:#F4E9D4; --muted:#9C8866; --card:#1A130C;
    --border:#3A2E1F; --accent:#D4A437; --accent-fg:#0F0B07; --accent-soft:rgba(212,164,55,.12);
    --target:#C0392B; --target-fg:#FFFFFF; --success:#7FA45C; --warning:#E0915C; --danger:#C0392B;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#555;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    display:flex;gap:28px;flex-wrap:wrap;justify-content:center;padding:28px 12px;color:#fff}
  .serif{font-family:"DM Serif Display",Georgia,serif}
  .stage{font-size:12px;text-align:center}
  .stage h2{font-weight:600;margin:0 0 8px;color:#eee;font-size:13px;letter-spacing:.02em}
  .phone{width:360px;background:var(--background);color:var(--foreground);
    border-radius:20px;padding:14px 10px 18px;border:1px solid rgba(0,0,0,.25);
    box-shadow:0 8px 30px rgba(0,0,0,.4);text-align:left}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.06);margin-bottom:12px}
  .muted{color:var(--muted)} .tabnum{font-variant-numeric:tabular-nums}
  .eyeline{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}

  /* ── CharacterHeader ── */
  .charhdr{display:flex;flex-direction:column;gap:8px}
  .row1{display:flex;align-items:center;gap:10px}
  .medwrap{position:relative;width:40px;height:40px;flex:0 0 40px}
  .chip{position:absolute;right:-4px;bottom:-4px;min-width:18px;height:18px;padding:0 3px;
    background:var(--accent);color:var(--accent-fg);border-radius:9px;border:1.5px solid var(--card);
    font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}
  .ovwrap{flex:1;min-width:0}
  .lv{font-size:12px;font-weight:600;letter-spacing:.04em}
  .bar{height:6px;background:var(--accent-soft);border-radius:999px;overflow:hidden;margin-top:3px}
  .bar > i{display:block;height:100%;background:var(--accent);border-radius:999px}
  .xpnum{font-size:11px;color:var(--muted);margin-top:2px}
  .streak{display:flex;align-items:center;gap:3px;flex:0 0 auto;color:var(--warning);font-weight:700}
  .row2{display:flex;gap:8px}
  .attr{flex:1;min-width:0}
  .attrlab{font-size:10px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
  .attrlab b{color:var(--accent)}
  .mbar{height:4px;background:var(--accent-soft);border-radius:999px;overflow:hidden;margin-top:3px}
  .mbar > i{display:block;height:100%;background:var(--accent)}

  /* ── Hero + QuestCard ribbon ── */
  .hero h1{font-size:22px;font-weight:600;margin:6px 0 2px;letter-spacing:-.01em}
  .ribbon{display:flex;gap:9px;align-items:flex-start;background:var(--accent-soft);
    border-left:3px solid var(--accent);border-radius:8px;padding:9px 10px;margin-top:10px}
  .ribbon .q{font-size:13px;font-weight:600}
  .ribbon .focal{font-size:15px;font-weight:700;color:var(--foreground)}
  .ribbon .focal.done{color:var(--success)}
  .ribbon .hint{font-size:11px;color:var(--muted);margin-top:2px}
  .brk{font-size:11px;color:var(--muted);margin-top:2px}

  /* ── BadgeWall ── */
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
  .badge{text-align:center}
  .medal{width:52px;height:52px;margin:0 auto;position:relative;display:flex;align-items:center;
    justify-content:center;border-radius:50%}
  .medal.un{background:var(--accent);color:var(--accent-fg);border:2px solid var(--accent)}
  .medal.lk{background:transparent;color:var(--muted);border:2px solid var(--muted);opacity:.55}
  .medal span{font-size:14px;font-weight:700}
  .bname{font-size:10px;margin-top:4px;line-height:1.15}
  .bhint{font-size:9px;color:var(--muted);margin-top:2px;line-height:1.1}
  .badge.lk .bname{color:var(--muted)}

  /* ── Level-up burst (static snapshot of mid-animation) ── */
  .burststage{display:flex;gap:18px;align-items:center;justify-content:center;padding:18px 0 6px}
  .burst{position:relative;width:80px;height:80px;display:flex;align-items:center;justify-content:center}
  .burst .ring{position:absolute;width:40px;height:40px;border-radius:50%;border:2px solid var(--accent)}
  .burst .r1{transform:scale(1.7);opacity:.45}
  .burst .r2{transform:scale(2.3);opacity:.12}
  .seclabel{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    color:var(--muted);margin:2px 0 4px}
</style>
</head>
<body>

<!-- macro: one phone column, parameterised by theme class -->
<script type="text/template" id="tpl"></script>

<div class="stage">
  <h2>LIGHT — cream / gold</h2>
  <div class="phone theme-light" id="light"></div>
</div>
<div class="stage">
  <h2>DARK — coal / gold</h2>
  <div class="phone theme-dark" id="dark"></div>
</div>

<script>
// Bullseye medallion in progress mode: overall 320/450 ≈ 71% -> 3 of 4 rings
// (matches Bullseye.tsx progressToRings: ceil(.71*4)=3). Outer muted shell + inner 3.
function medallion(size){
  return `<svg viewBox="0 0 32 32" width="${size}" height="${size}" aria-hidden>
    <circle cx="16" cy="16" r="14" fill="none" stroke="var(--muted)" stroke-width="2"/>
    <circle cx="16" cy="16" r="11" fill="var(--target-fg)"/>
    <circle cx="16" cy="16" r="7"  fill="var(--target)"/>
    <circle cx="16" cy="16" r="3"  fill="var(--target-fg)"/>
  </svg>`;
}
// small attribute bullseye (filled, for /character cards — shown here decoratively)
// hand-rolled flame, currentColor
function flame(size,filled){
  return `<svg viewBox="0 0 20 24" width="${size}" height="${size*1.2}" aria-hidden
    fill="${filled?'currentColor':'none'}" stroke="currentColor" stroke-width="${filled?0:1.5}">
    <path d="M10 1 C10 6 4 8 4 14 a6 6 0 0 0 12 0 c0-3-2-4.5-3-6 -0.5 2 -1.5 3 -3 3 C9 9 11 5 10 1 Z"/>
  </svg>`;
}
function attr(lab,lv,pct){
  return `<div class="attr">
    <div class="attrlab"><b>${lab}</b>&nbsp;${lv}</div>
    <div class="mbar"><i style="width:${pct}%"></i></div>
  </div>`;
}
function badge(mark,name,unlocked,hint){
  return `<div class="badge ${unlocked?'':'lk'}">
    <div class="medal ${unlocked?'un':'lk'}"><span class="serif">${mark}</span></div>
    <div class="bname serif">${name}</div>
    ${unlocked?'':`<div class="bhint">${hint}</div>`}
  </div>`;
}

function column(){
  return `
  <!-- CharacterHeader (~72px) -->
  <div class="card charhdr" style="padding:12px 12px">
    <div class="row1">
      <div class="medwrap">${medallion(40)}<span class="chip serif">7</span></div>
      <div class="ovwrap">
        <div class="lv">LV 7</div>
        <div class="bar"><i style="width:71%"></i></div>
        <div class="xpnum tabnum">320 / 450 XP</div>
      </div>
      <div class="streak">${flame(16,true)}<span class="tabnum">12</span></div>
    </div>
    <div class="row2">
      ${attr('STR',9,66)}${attr('END',7,42)}${attr('MOB',5,30)}${attr('CON',11,80)}
    </div>
  </div>

  <!-- Hero with QuestCard ribbon — PRE-training -->
  <div class="card hero">
    <div class="eyeline">Week 6 · Phase 2 · Strength + Capacity</div>
    <h1 class="serif">Upper Power</h1>
    <div class="muted" style="font-size:12px">Monday, Jun 9 · 5×3 bench focus</div>
    <div class="ribbon">
      <div style="color:var(--target)">${medallion(22)}</div>
      <div>
        <div class="q">Today's quest · <span class="focal">~70 XP</span></div>
        <div class="hint">Bonus in play: PR chance +40</div>
      </div>
    </div>
  </div>

  <!-- QuestCard ribbon — POST-training (completed) -->
  <div class="card hero">
    <div class="eyeline">Quest complete</div>
    <div class="ribbon" style="margin-top:8px">
      <div style="color:var(--target)">${medallion(22)}</div>
      <div>
        <div class="q"><span class="focal done">+83 XP earned</span></div>
        <div class="brk tabnum">Workout +25 · Volume +8 · PR +40 · Adherence +10</div>
      </div>
    </div>
  </div>

  <!-- BadgeWall slice (/character) -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-weight:600;font-size:15px" class="serif">Badges</div>
      <div class="muted tabnum" style="font-size:12px">7 / 16</div>
    </div>
    <div class="grid">
      ${badge('1st','First Blood',true)}
      ${badge('PR','On Record',true)}
      ${badge('×10','PR Machine',true)}
      ${badge('△','Trail Rat',true)}
      ${badge('▲','Elbert Ready',false,'Single hike ≥4,000 ft')}
      ${badge('30','Iron Month',false,'Reach a 30-day streak')}
      ${badge('7d','1 Week Strong',true)}
      ${badge('✓','Self-Examined',true)}
    </div>
  </div>

  <!-- Level-up celebration (static mid-animation snapshot) -->
  <div class="card">
    <div class="seclabel">Level-up — ring-burst (snapshot)</div>
    <div class="burststage">
      <div class="burst">
        <div class="ring r2"></div>
        <div class="ring r1"></div>
        <div class="medwrap" style="width:40px;height:40px">
          ${medallion(40)}<span class="chip serif">8</span>
        </div>
      </div>
      <div style="text-align:left">
        <div class="serif" style="font-size:18px">Level 8</div>
        <div class="muted" style="font-size:11px">gold double-ring burst<br>+ medallion bullseye-pop</div>
      </div>
    </div>
  </div>
  `;
}
document.getElementById('light').innerHTML = column();
document.getElementById('dark').innerHTML  = column();
</script>
</body>
</html>
